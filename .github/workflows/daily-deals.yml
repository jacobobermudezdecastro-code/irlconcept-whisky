name: Daily Whisky Deals

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: writ

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright setuptools "playwright-stealth<2"
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: python scripts/scrape_whisky.py
        env:
          LANG: es_ES.UTF-8

      - name: Ensure CNAME exists
        run: |
          echo "irlconcept.com" > docs/CNAME

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Update whisky deals report"
          git push
